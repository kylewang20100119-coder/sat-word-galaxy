<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title description">
  <title id="title">Lexiverse</title>
  <desc id="description">A luminous L surrounded by a word-galaxy orbit.</desc>
  <defs>
    <radialGradient id="space" cx="36%" cy="26%" r="88%">
      <stop offset="0" stop-color="#17354d"/>
      <stop offset="0.58" stop-color="#091827"/>
      <stop offset="1" stop-color="#040b13"/>
    </radialGradient>
    <linearGradient id="orbit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#42d6da"/>
      <stop offset="0.52" stop-color="#a990ff"/>
      <stop offset="1" stop-color="#f2c14e"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#space)"/>
  <circle cx="256" cy="256" r="176" fill="none" stroke="#42d6da" stroke-opacity="0.14" stroke-width="2"/>
  <ellipse cx="256" cy="256" rx="198" ry="94" fill="none" stroke="url(#orbit)" stroke-width="7" transform="rotate(-18 256 256)"/>
  <ellipse cx="256" cy="256" rx="116" ry="202" fill="none" stroke="#a990ff" stroke-opacity="0.34" stroke-width="3" transform="rotate(37 256 256)"/>
  <circle cx="80" cy="318" r="12" fill="#42d6da" filter="url(#glow)"/>
  <circle cx="407" cy="164" r="10" fill="#f2c14e" filter="url(#glow)"/>
  <circle cx="353" cy="421" r="7" fill="#a990ff" filter="url(#glow)"/>
  <path d="M210 151h57v176h100v49H210z" fill="#f5fbff"/>
  <path d="M198 137h57" stroke="#42d6da" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <g fill="#f5fbff" opacity="0.7">
    <circle cx="126" cy="128" r="3"/><circle cx="374" cy="91" r="3"/><circle cx="430" cy="311" r="2"/><circle cx="113" cy="409" r="2"/>
  </g>
</svg>
